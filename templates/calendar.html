{% extends 'base.html' %}

{% block title %}Farming Calendar - AgriVision AI{% endblock %}

{% block header_title %}Farming Calendar{% endblock %}

{% block content %}
<div style="display: flex; flex-direction: column; gap: 2rem;">
    <!-- Calendar Settings Form -->
    <section class="glass-panel" style="padding: 2rem;">
        <h2 style="font-size: 1.3rem; margin-bottom: 1.5rem; letter-spacing: -0.3px;" class="trn" data-key="calendar_title">Interactive Farming Calendar</h2>
        
        <form id="calendar-generator-form">
            <div class="form-grid" style="margin-bottom: 1.5rem; display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 1.5rem;">
                <!-- Crop Variety Selector -->
                <div class="form-group" style="display: flex; flex-direction: column; gap: 0.5rem;">
                    <label for="cal-crop" class="form-label trn" data-key="form_crop">Crop Variety</label>
                    <select id="cal-crop" class="form-control" style="width: 100%; height: 44px; padding: 0.5rem 1rem; border-radius: 10px; border: 1px solid var(--border-color); background: var(--card-bg); color: inherit;">
                        <optgroup label="Palms" class="trn" data-key="grp_palms">
                            <option value="coconut" class="trn" data-key="crop_coconut">Coconut (Palm)</option>
                            <option value="arecanut" class="trn" data-key="crop_arecanut">Arecanut</option>
                        </optgroup>
                        <optgroup label="Fruit Crops" class="trn" data-key="grp_fruits">
                            <option value="banana" class="trn" data-key="crop_banana">Banana / Plantain</option>
                            <option value="mango" class="trn" data-key="crop_mango">Mango</option>
                            <option value="papaya" class="trn" data-key="crop_papaya">Papaya</option>
                        </optgroup>
                        <optgroup label="Vegetable Crops" class="trn" data-key="grp_vegetables">
                            <option value="tomato" class="trn" data-key="crop_tomato">Tomato</option>
                            <option value="brinjal" class="trn" data-key="crop_brinjal">Brinjal (Eggplant)</option>
                            <option value="chilli" class="trn" data-key="crop_chilli">Chilli / Capsicum</option>
                        </optgroup>
                        <optgroup label="Spices & Climbers" class="trn" data-key="grp_spices">
                            <option value="pepper" class="trn" data-key="crop_pepper">Black Pepper</option>
                        </optgroup>
                        <optgroup label="Beverages" class="trn" data-key="grp_beverages">
                            <option value="cocoa" class="trn" data-key="crop_cocoa">Cocoa</option>
                        </optgroup>
                        <optgroup label="Cereal Crops" class="trn" data-key="grp_cereals">
                            <option value="paddy" class="trn" data-key="crop_paddy">Paddy (Rice)</option>
                        </optgroup>
                        <optgroup label="Plantation Trees" class="trn" data-key="grp_plantation">
                            <option value="rubber" class="trn" data-key="crop_rubber">Rubber Tree</option>
                        </optgroup>
                    </select>
                </div>

                <!-- Planting/Sowing Date Picker -->
                <div class="form-group" style="display: flex; flex-direction: column; gap: 0.5rem;">
                    <label for="cal-sowing-date" class="form-label trn" data-key="form_sowing_date">Sowing / Planting Date</label>
                    <input type="date" id="cal-sowing-date" class="form-control" style="width: 100%; height: 44px; padding: 0.5rem 1rem; border-radius: 10px; border: 1px solid var(--border-color); background: var(--card-bg); color: inherit;" required>
                </div>
            </div>

            <button type="submit" class="submit-btn" style="display: flex; align-items: center; justify-content: center; gap: 0.5rem; padding: 0.75rem 2rem; border-radius: 50px; background: var(--primary-light); color: white; border: none; cursor: pointer; font-weight: 700; width: 100%; max-width: 320px; transition: background 0.2s;">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                    <line x1="16" y1="2" x2="16" y2="6"></line>
                    <line x1="8" y1="2" x2="8" y2="6"></line>
                    <line x1="3" y1="10" x2="21" y2="10"></line>
                </svg>
                <span class="trn" data-key="btn_generate_calendar">Generate Farming Schedule</span>
            </button>
        </form>
    </section>

    <!-- Calendar Timeline Output -->
    <section class="glass-panel" id="calendar-results-section" style="display: none; padding: 2rem;">
        <div style="display: flex; justify-content: space-between; align-items: baseline; border-bottom: 1px solid var(--border-color); padding-bottom: 1rem; margin-bottom: 2rem; flex-wrap: wrap; gap: 1rem;">
            <div>
                <h2 style="font-size: 1.3rem; color: var(--primary-light); margin-bottom: 0.25rem;" id="cal-crop-title">Banana Schedule</h2>
                <p style="font-size: 0.85rem; opacity: 0.7;"><span class="trn" data-key="calendar_start_date">Planted on</span>: <strong id="cal-start-date-text">2026-06-18</strong></p>
            </div>
            <button id="clear-calendar-btn" class="btn" style="background: rgba(234, 67, 53, 0.1); color: var(--accent-danger); border: 1px solid rgba(234, 67, 53, 0.2); padding: 0.5rem 1rem; border-radius: 50px; font-weight: 600; cursor: pointer; transition: all 0.2s;">
                🗑️ <span class="trn" data-key="btn_clear_calendar">Clear Schedule</span>
            </button>
        </div>

        <!-- Timeline container -->
        <div class="calendar-timeline" id="calendar-timeline-container" style="position: relative; padding-left: 2rem; border-left: 2px dashed var(--border-color); margin-left: 1rem; display: flex; flex-direction: column; gap: 2rem;">
            <!-- Timeline elements injected here dynamically -->
        </div>
    </section>
</div>
{% endblock %}
